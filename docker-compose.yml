services:
  park4mikines:
    image: ghcr.io/mikiligero/park4mikines:latest
    container_name: park4mikines
    restart: always
    network_mode: "host" # Optimized for LXC
    security_opt:
      - apparmor:unconfined
    environment:
      - DATABASE_URL=file:/tmp/app.db
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./prisma/app.db:/tmp/app.db
      - ./public/uploads:/app/public/uploads
